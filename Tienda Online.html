  <script>
        // Configuration
        const defaultConfig = {
            store_title: "Mi Tienda Online",
            whatsapp_number: "3777731026"
        };

        // Cart state
        let cart = [];
        let cartVisible = false;

        // DOM elements
        const cartToggle = document.getElementById('cart-toggle');
        const cartPanel = document.getElementById('cart-panel');
        const closeCart = document.getElementById('close-cart');
        const cartCount = document.getElementById('cart-count');
        const cartItems = document.getElementById('cart-items');
        const totalAmount = document.getElementById('total-amount');
        const sendOrderBtn = document.getElementById('send-order');
        const customerName = document.getElementById('customer-name');
        const customerAddress = document.getElementById('customer-address');

        // Add to cart function
        function addToCart(name, price) {
            const existingItem = cart.find(item => item.name === name);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            
            updateCartDisplay();
            updateProductDisplays();
            showCartNotification();
        }

        // Update product quantity from product cards
        function updateProductQuantity(name, price, change) {
            const existingItem = cart.find(item => item.name === name);
            
            if (existingItem) {
                existingItem.quantity += change;
                if (existingItem.quantity <= 0) {
                    removeFromCart(name);
                    return;
                }
            } else if (change > 0) {
                cart.push({ name, price, quantity: change });
            }
            
            updateCartDisplay();
            updateProductDisplays();
        }

        // Update product displays
        function updateProductDisplays() {
            const products = ['Yerba Mate 1kg', 'Azúcar 1kg', 'Galletitas Dulces', 'Coca Cola'];
            
            products.forEach(productName => {
                const qtyElement = document.getElementById(`qty-${productName}`);
                const cartItem = cart.find(item => item.name === productName);
                if (qtyElement) {
                    qtyElement.textContent = cartItem ? cartItem.quantity : 0;
                }
            });
        }

        // Remove from cart
        function removeFromCart(name) {
            cart = cart.filter(item => item.name !== name);
            updateCartDisplay();
            updateProductDisplays();
        }

        // Update quantity
        function updateQuantity(name, change) {
            const item = cart.find(item => item.name === name);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(name);
                } else {
                    updateCartDisplay();
                    updateProductDisplays();
                }
            }
        }

        // Update cart display
        function updateCartDisplay() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            cartCount.textContent = totalItems;
            totalAmount.textContent = `$${total.toLocaleString()}`;
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-gray-500 text-center py-8">Tu carrito está vacío</p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-lg cart-item-enter">
                        <div>
                            <h4 class="font-semibold">${item.name}</h4>
                            <p class="text-gray-600">$${item.price.toLocaleString()} c/u</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button onclick="updateQuantity('${item.name}', -1)" class="bg-red-500 text-white w-8 h-8 rounded-full hover:bg-red-600 transition-colors">-</button>
                            <span class="font-semibold">${item.quantity}</span>
                            <button onclick="updateQuantity('${item.name}', 1)" class="bg-blue-500 text-white w-8 h-8 rounded-full hover:bg-blue-600 transition-colors">+</button>
                            <button onclick="removeFromCart('${item.name}')" class="text-red-500 hover:text-red-700 ml-2">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }
            
            validateOrderForm();
        }

        // Validate order form
        function validateOrderForm() {
            const hasItems = cart.length > 0;
            const hasName = customerName.value.trim().length > 0;
            const hasAddress = customerAddress.value.trim().length > 0;
            
            sendOrderBtn.disabled = !(hasItems && hasName && hasAddress);
        }

        // Show cart notification
        function showCartNotification() {
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50';
            notification.textContent = '¡Producto agregado al carrito!';
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // Toggle cart visibility
        function toggleCart() {
            cartVisible = !cartVisible;
            cartPanel.classList.toggle('hidden', !cartVisible);
        }

        // Send order via WhatsApp
        function sendOrder() {
            if (cart.length === 0 || !customerName.value.trim() || !customerAddress.value.trim()) return;
            
            const config = window.elementSdk?.config || defaultConfig;
            const whatsappNumber = config.whatsapp_number || defaultConfig.whatsapp_number;
            
            let message = '¡Hola! Me gustaría hacer el siguiente pedido:\n\n';
            
            // Customer information
            message += `*DATOS DEL CLIENTE:*\n`;
            message += `👤 Nombre: ${customerName.value.trim()}\n`;
            message += `📍 Dirección: ${customerAddress.value.trim()}\n\n`;
            
            // Order details
            message += `*PEDIDO:*\n`;
            cart.forEach(item => {
                message += `• ${item.name} x${item.quantity} - $${(item.price * item.quantity).toLocaleString()}\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*TOTAL: $${total.toLocaleString()}*\n\n`;
            message += `¡Gracias por tu pedido! 😊`;
            
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
        }

        // Event listeners
        cartToggle.addEventListener('click', toggleCart);
        closeCart.addEventListener('click', toggleCart);
        sendOrderBtn.addEventListener('click', sendOrder);
        customerName.addEventListener('input', validateOrderForm);
        customerAddress.addEventListener('input', validateOrderForm);

        // Element SDK integration
        async function onConfigChange(config) {
            const storeTitle = document.getElementById('store-title');
            storeTitle.textContent = config.store_title || defaultConfig.store_title;
        }

        function mapToCapabilities(config) {
            return {
                recolorables: [
                    {
                        get: () => config.primary_color || "#4f46e5",
                        set: (value) => {
                            config.primary_color = value;
                            if (window.elementSdk) {
                                window.elementSdk.setConfig({ primary_color: value });
                            }
                        }
                    }
                ],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }

        function mapToEditPanelValues(config) {
            return new Map([
                ["store_title", config.store_title || defaultConfig.store_title],
                ["whatsapp_number", config.whatsapp_number || defaultConfig.whatsapp_number]
            ]);
        }

        // Initialize Element SDK
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }
    </script>
